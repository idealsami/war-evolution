<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>战争进化史 - 重制版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080810; color:#ddd; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; user-select:none; }

#top-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 16px; background:linear-gradient(135deg,#0d1117,#161b22);
  border-bottom:2px solid #21262d; min-height:44px; flex-shrink:0;
}
.res { display:flex; gap:16px; align-items:center; font-size:14px; }
.res span { display:flex; align-items:center; gap:4px; }
.gold { color:#ffd700; } .exp { color:#a78bfa; } .kills-c { color:#f87171; }
.era-info { font-size:15px; font-weight:bold; color:#e94560; }
.hp-wrap { display:flex; align-items:center; gap:6px; }
.hp-bar { width:100px; height:14px; background:#21262d; border-radius:7px; overflow:hidden; border:1px solid #30363d; }
.hp-fill { height:100%; transition:width 0.3s; border-radius:7px; }
.hp-fill.blue { background:linear-gradient(90deg,#1f6feb,#58a6ff); }
.hp-fill.red { background:linear-gradient(90deg,#da3633,#f85149); }
.hp-txt { font-size:11px; min-width:50px; }

#canvas-wrap { flex:1; position:relative; }
canvas { display:block; width:100%; height:100%; }

#controls {
  background:linear-gradient(135deg,#0d1117,#161b22);
  border-top:2px solid #21262d; padding:6px 10px; flex-shrink:0;
}
#unit-btns { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
.unit-btn {
  padding:5px 10px; border:1px solid #30363d; border-radius:6px;
  background:#161b22; color:#c9d1d9; cursor:pointer; font-size:11px;
  transition:all 0.15s; display:flex; flex-direction:column; align-items:center; min-width:72px;
}
.unit-btn:hover { background:#21262d; border-color:#58a6ff; transform:translateY(-1px); }
.unit-btn .cost { color:#ffd700; font-size:10px; }
.unit-btn .hk { color:#484f58; font-size:10px; }
.unit-btn.dis { opacity:0.35; cursor:not-allowed; pointer-events:none; }
.unit-btn .desc { color:#8b949e; font-size:9px; }

#upgrade-bar { display:flex; gap:6px; justify-content:center; margin-top:4px; }
.u-btn {
  padding:4px 12px; border:1px solid #da3633; border-radius:6px;
  background:linear-gradient(135deg,#1a0a0a,#0d1117); color:#f85149;
  cursor:pointer; font-size:11px; font-weight:bold;
}
.u-btn:hover { background:#da3633; color:#fff; }
.u-btn.dis { opacity:0.35; cursor:not-allowed; pointer-events:none; }

#speed-btn { border-color:#3fb950; color:#3fb950; background:linear-gradient(135deg,#0a1a0a,#0d1117); }
#speed-btn:hover { background:#3fb950; color:#000; }

#toast {
  position:absolute; top:45%; left:50%; transform:translate(-50%,-50%);
  font-size:42px; font-weight:bold; text-shadow:0 0 20px rgba(0,0,0,0.9);
  pointer-events:none; opacity:0; transition:opacity 0.4s; z-index:10; white-space:nowrap;
}

#game-over {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.88); display:none; z-index:20;
  flex-direction:column; align-items:center; justify-content:center;
}
#game-over h1 { font-size:56px; margin-bottom:16px; }
#game-over p { font-size:18px; margin-bottom:24px; color:#8b949e; }
#game-over button {
  padding:10px 36px; font-size:16px; border:none; border-radius:8px;
  background:#e94560; color:#fff; cursor:pointer; transition:background 0.2s;
}
#game-over button:hover { background:#ff6b6b; }

#how-to {
  position:absolute; bottom:10px; right:10px; font-size:10px; color:#30363d; z-index:5;
}
</style>
</head>
<body>

<div id="top-bar">
  <div class="res">
    <span class="gold">💰 <b id="gold">150</b></span>
    <span class="exp">⭐ <b id="exp">0</b></span>
    <span class="kills-c">💀 <b id="kills">0</b></span>
  </div>
  <div class="hp-wrap">
    <span class="hp-txt" style="color:#58a6ff">🏠<span id="bhp">3000</span></span>
    <div class="hp-bar"><div class="hp-fill blue" id="bbar"></div></div>
  </div>
  <div class="era-info" id="era-name">石器时代</div>
  <div class="hp-wrap">
    <div class="hp-bar"><div class="hp-fill red" id="rbar"></div></div>
    <span class="hp-txt" style="color:#f85149"><span id="rhp">3000</span>🏠</span>
  </div>
  <div class="res"><span>⏱ <b id="timer">0:00</b></span></div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="toast"></div>
  <div id="game-over">
    <h1 id="go-title">💀 战败</h1>
    <p id="go-desc">你的基地被摧毁了</p>
    <button onclick="restart()">再来一局</button>
  </div>
  <div id="how-to">1-4出兵 | Q升级时代 | W攻击强化 | E生命强化 | R经济强化</div>
</div>

<div id="controls">
  <div id="unit-btns"></div>
  <div id="upgrade-bar">
    <button class="u-btn" id="btn-era">⏩ 升级时代</button>
    <button class="u-btn" id="btn-atk">⚔️ 攻击</button>
    <button class="u-btn" id="btn-hp">❤️ 生命</button>
    <button class="u-btn" id="btn-gold">💰 经济</button>
    <button class="u-btn" id="speed-btn">⏩ x1</button>
  </div>
</div>

<script>
// ============ CANVAS ============
const cv = document.getElementById('game');
const cx = cv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
let W, H, GY;
function resize(){ W=cv.width=wrap.clientWidth; H=cv.height=wrap.clientHeight; GY=H-50; }
resize(); window.addEventListener('resize',resize);

// ============ ERAS (8 eras, 3-4 units each) ============
const ERAS=[
{name:'石器时代',bg:'#1a120a',gnd:'#3d2e15',sky:'#2a1f10',
 units:[
  {id:'stick',  name:'棒兵',   emoji:'🪵', hp:80,  atk:10, spd:0.35, range:28,  as:0.25, cost:10, sz:13},
  {id:'stone',  name:'投石手', emoji:'🪨', hp:50,  atk:18, spd:0.3,  range:110, as:0.18, cost:20, sz:11, ranged:1},
  {id:'mammoth',name:'猛犸象', emoji:'🐘', hp:250, atk:28, spd:0.18, range:32,  as:0.15, cost:55, sz:22},
 ]},
{name:'青铜时代',bg:'#12120a',gnd:'#4a3d1e',sky:'#1e1a0e',
 units:[
  {id:'sword',  name:'剑士',   emoji:'⚔️', hp:120, atk:18, spd:0.38, range:28,  as:0.28, cost:20, sz:13},
  {id:'archer', name:'弓箭手', emoji:'🏹', hp:70,  atk:26, spd:0.3,  range:150, as:0.2,  cost:30, sz:11, ranged:1},
  {id:'spear',  name:'枪兵',   emoji:'🔱', hp:100, atk:22, spd:0.35, range:42,  as:0.22, cost:25, sz:13},
  {id:'chariot',name:'战车',   emoji:'🐎', hp:200, atk:30, spd:0.5,  range:30,  as:0.2,  cost:55, sz:19},
 ]},
{name:'铁器时代',bg:'#0e0e14',gnd:'#3a3a4a',sky:'#14141e',
 units:[
  {id:'knight', name:'骑士',   emoji:'🛡️', hp:180, atk:28, spd:0.4,  range:30,  as:0.28, cost:40, sz:15},
  {id:'cross',  name:'弩手',   emoji:'🏹', hp:90,  atk:40, spd:0.28, range:170, as:0.15, cost:45, sz:12, ranged:1},
  {id:'catapult',name:'投石车',emoji:'🪨', hp:140, atk:70, spd:0.12, range:240, as:0.08, cost:75, sz:22, ranged:1},
  {id:'beast',  name:'战争巨兽',emoji:'🦣', hp:400, atk:45, spd:0.2,  range:34,  as:0.15, cost:90, sz:26},
 ]},
{name:'中世纪',bg:'#0a0e14',gnd:'#2e3a2e',sky:'#0e1418',
 units:[
  {id:'hkn',   name:'重装骑士',emoji:'⚜️', hp:260, atk:40, spd:0.35, range:32,  as:0.25, cost:55, sz:16},
  {id:'longbow',name:'长弓手', emoji:'🎯', hp:100, atk:50, spd:0.28, range:190, as:0.18, cost:50, sz:12, ranged:1},
  {id:'treb',   name:'投石机', emoji:'🏗️', hp:170, atk:95, spd:0.1,  range:270, as:0.07, cost:90, sz:24, ranged:1},
  {id:'pala',   name:'圣骑士', emoji:'✨', hp:350, atk:50, spd:0.38, range:35,  as:0.22, cost:80, sz:18},
 ]},
{name:'火药时代',bg:'#14100a',gnd:'#3a2e1e',sky:'#1e180e',
 units:[
  {id:'musket', name:'火枪手', emoji:'🔫', hp:120, atk:55, spd:0.3,  range:190, as:0.15, cost:50, sz:13, ranged:1},
  {id:'pike',   name:'长枪兵', emoji:'🔱', hp:150, atk:35, spd:0.32, range:45,  as:0.25, cost:35, sz:13},
  {id:'cannon', name:'大炮',   emoji:'💣', hp:180, atk:110,spd:0.1,  range:290, as:0.06, cost:110,sz:24, ranged:1},
  {id:'cavalry',name:'骑兵',   emoji:'🐴', hp:240, atk:60, spd:0.55, range:30,  as:0.22, cost:70, sz:18},
 ]},
{name:'工业时代',bg:'#101010',gnd:'#2e2e2e',sky:'#141414',
 units:[
  {id:'rifle',  name:'步枪兵', emoji:'🔫', hp:160, atk:65, spd:0.32, range:210, as:0.18, cost:55, sz:13, ranged:1},
  {id:'mg',     name:'机枪手', emoji:'🔫', hp:140, atk:38, spd:0.22, range:170, as:0.6,  cost:70, sz:15, ranged:1},
  {id:'tank',   name:'坦克',   emoji:'🛡️', hp:480, atk:80, spd:0.25, range:60,  as:0.15, cost:140,sz:26},
  {id:'arty',   name:'火炮',   emoji:'💥', hp:120, atk:130,spd:0.08, range:340, as:0.06, cost:120,sz:22, ranged:1},
 ]},
{name:'现代战争',bg:'#08080e',gnd:'#1e1e2e',sky:'#0a0a14',
 units:[
  {id:'marine', name:'海军陆战队',emoji:'🎖️',hp:200, atk:75, spd:0.35, range:230, as:0.2,  cost:65, sz:14, ranged:1},
  {id:'rpg',    name:'火箭兵', emoji:'🚀', hp:140, atk:140,spd:0.28, range:250, as:0.12, cost:85, sz:13, ranged:1},
  {id:'mbt',    name:'主战坦克',emoji:'🛡️', hp:700, atk:100,spd:0.2,  range:65,  as:0.15, cost:180,sz:28},
  {id:'heli',   name:'直升机', emoji:'🚁', hp:280, atk:85, spd:0.45, range:200, as:0.25, cost:150,sz:20, ranged:1, flying:1},
 ]},
{name:'未来战争',bg:'#050510',gnd:'#141428',sky:'#06060e',
 units:[
  {id:'plasma', name:'等离子兵',emoji:'⚡', hp:220, atk:95, spd:0.38, range:240, as:0.22, cost:75, sz:14, ranged:1},
  {id:'mech',   name:'机甲战士',emoji:'🤖', hp:580, atk:110,spd:0.25, range:50,  as:0.2,  cost:170,sz:24},
  {id:'railgun',name:'电磁炮', emoji:'🔫', hp:170, atk:220,spd:0.1,  range:380, as:0.1,  cost:190,sz:20, ranged:1},
  {id:'drone',  name:'无人机群',emoji:'🛸', hp:200, atk:65, spd:0.6,  range:210, as:0.4,  cost:110,sz:16, ranged:1, flying:1},
 ]},
];

// ============ STATE ============
let S={};
function init(){
 S={
  gold:150, exp:0, kills:0, era:0,
  bhp:3000, rhp:3000, maxhp:3000,
  units:[], proj:[], parts:[],
  atkM:1, hpM:1, goldM:1,
  atkU:0, hpU:0, goldU:0,
  aiT:0, aiInt:600,  // AI spawn interval (slower)
  over:false, pause:false, tick:0, speed:1,
  gameTime:0,
 };
}
init();

function curE(){ return ERAS[S.era]; }
function eraCost(){ return 120 + S.era*100; }

// ============ SPAWN ============
function mkUnit(tpl, team, x){
 const hp=Math.round(tpl.hp*S.hpM*(team==='red'?1+S.era*0.06:1));
 const atk=Math.round(tpl.atk*S.atkM*(team==='red'?1+S.era*0.04:1));
 return {...tpl, team, x, y:GY, hp, mhp:hp, atk, cd:0, dead:false,
  af:0, at:0, flash:0, atkAnim:0, target:null};
}

function spawnBlue(id){
 const era=curE();
 const t=era.units.find(u=>u.id===id);
 if(!t||S.gold<t.cost) return;
 S.gold-=t.cost;
 const u=mkUnit(t,'blue',100);
 S.units.push(u);
 // spawn effect
 addPart(u.x, u.y-10, '#58a6ff', 6, 4);
}

function spawnRed(id, ei){
 const era=ERAS[ei||S.era];
 const t=era.units.find(u=>u.id===id);
 if(!t) return;
 const u=mkUnit(t,'red',W-100);
 S.units.push(u);
}

// ============ PROJECTILES ============
function fireProj(from, tgt){
 S.proj.push({
  x:from.x+(from.team==='blue'?18:-18),
  y:from.y-(from.flying?35:(from.sz||13)),
  tx:tgt.x, ty:tgt.y-(tgt.flying?35:(tgt.sz||13)),
  team:from.team, dmg:from.atk, spd:4, alive:1, trail:[],
  aoe:from.id==='cannon'||from.id==='treb'||from.id==='arty'||from.id==='catapult'||from.id==='railgun'?40:0,
 });
}

// ============ PARTICLES ============
function addPart(x,y,col,n,sp){
 for(let i=0;i<n;i++) S.parts.push({
  x,y, vx:(Math.random()-0.5)*sp, vy:-Math.random()*sp*0.7-0.5,
  life:25+Math.random()*15, ml:40, col, sz:2+Math.random()*2,
 });
}
function addText(x,y,txt,col){
 S.parts.push({x,y,vx:0,vy:-1.5,life:45,ml:45,text:txt,col,sz:13});
}

// ============ KILL ============
function killUnit(u, killerTeam){
 u.dead=1;
 const goldGain=Math.round((8+u.cost*0.35)*S.goldM);
 const expGain=Math.round(4+u.cost*0.18);
 if(killerTeam==='blue'){
  S.gold+=goldGain; S.exp+=expGain; S.kills++;
  addText(u.x, u.y-45, '+'+goldGain+'💰', '#ffd700');
 }
 addPart(u.x, u.y-10, u.team==='blue'?'#58a6ff':'#f85149', 10, 5);
}

// ============ UPDATE ============
function update(){
 if(S.over||S.pause) return;
 for(let sp=0;sp<S.speed;sp++){
  S.tick++;
  S.gameTime+=1/60;

  // passive gold
  if(S.tick%200===0) S.gold+=Math.round((4+S.era*2)*S.goldM);

  // update units
  for(const u of S.units){
   if(u.dead) continue;
   u.at++;
   if(u.at>18){u.at=0;u.af=(u.af+1)%4;}
   if(u.flash>0) u.flash--;
   if(u.cd>0) u.cd--;
   if(u.atkAnim>0) u.atkAnim--;

   // find nearest enemy
   let near=null, nd=Infinity;
   for(const e of S.units){
    if(e.dead||e.team===u.team) continue;
    const d=Math.abs(e.x-u.x);
    if(d<nd){nd=d;near=e;}
   }

   const baseX=u.team==='blue'?W-100:100;
   const db=Math.abs(u.x-baseX);
   const inR=near&&nd<=u.range;
   const baseR=db<=80;

   if(inR){
    // attack enemy
    if(u.cd<=0){
     u.cd=Math.round(60/u.as);
     u.atkAnim=8;
     if(u.ranged){
      fireProj(u, near);
     } else {
      near.hp-=u.atk;
      near.flash=6;
      addText(near.x, near.y-28, '-'+u.atk, '#ff4444');
      addPart(near.x, near.y-8, '#ff6644', 3, 3);
      if(near.hp<=0) killUnit(near, u.team);
     }
    }
   } else if(baseR){
    // at enemy base — stop and attack it
    if(u.cd<=0){
     u.cd=Math.round(60/u.as);
     u.atkAnim=8;
     if(u.ranged){
      fireProj(u, {x:baseX, y:GY-30, flying:0, sz:30});
     } else {
      if(u.team==='blue'){S.rhp-=u.atk; addText(W-100,GY-55,'-'+u.atk,'#f85149');addPart(W-100,GY-15,'#f85149',5,5);}
      else {S.bhp-=u.atk; addText(100,GY-55,'-'+u.atk,'#58a6ff');addPart(100,GY-15,'#58a6ff',5,5);}
     }
    }
   } else {
    // move toward enemy base
    u.x+=u.spd*(u.team==='blue'?1:-1);
   }
  }

  // projectiles
  for(const p of S.proj){
   if(!p.alive) continue;
   p.trail.push({x:p.x,y:p.y});
   if(p.trail.length>6) p.trail.shift();
   const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.sqrt(dx*dx+dy*dy);
   if(dist<8){
    p.alive=0;
    // hit
    if(p.aoe>0){
     // AOE
     for(const u of S.units){
      if(u.dead||u.team===p.team) continue;
      if(Math.abs(u.x-p.tx)<p.aoe){
       u.hp-=p.dmg;
       u.flash=6;
       addText(u.x, u.y-28, '-'+p.dmg, '#ff4444');
       addPart(u.x, u.y-8, '#ffaa44', 5, 5);
       if(u.hp<=0) killUnit(u, p.team);
      }
     }
     addPart(p.tx, p.ty, '#ff8844', 12, 6);
    } else {
     for(const u of S.units){
      if(u.dead||u.team===p.team) continue;
      if(Math.abs(u.x-p.tx)<25){
       u.hp-=p.dmg; u.flash=6;
       addText(u.x, u.y-28, '-'+p.dmg, '#ff4444');
       addPart(u.x, u.y-8, '#ffaa44', 3, 3);
       if(u.hp<=0) killUnit(u, p.team);
       break;
      }
     }
    }
   } else {
    p.x+=dx/dist*p.spd; p.y+=dy/dist*p.spd;
   }
  }

  // particles
  for(const p of S.parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life--;}
  S.parts=S.parts.filter(p=>p.life>0);
  S.proj=S.proj.filter(p=>p.alive);
  S.units=S.units.filter(u=>!u.dead);

  // AI
  S.aiT++;
  if(S.aiT>=S.aiInt){
   S.aiT=0;
   aiSpawn();
   S.aiInt=Math.max(300, 600-S.era*25);
  }

  // game over
  if(S.bhp<=0){S.bhp=0;endGame(0);}
  if(S.rhp<=0){S.rhp=0;endGame(1);}
 }
}

// ============ AI ============
function aiSpawn(){
 const ei=Math.min(S.era+(Math.random()<0.15?1:0), ERAS.length-1);
 const era=ERAS[ei];
 const budget=15+S.era*12;
 let spent=0;
 for(let i=0;i<4&&spent<budget+8;i++){
  const t=era.units[Math.floor(Math.random()*era.units.length)];
  if(spent+t.cost<=budget+10){
   spawnRed(t.id, ei);
   spent+=t.cost;
  }
 }
}

// ============ DRAW ============
function draw(){
 const era=curE();

 // sky
 const sg=cx.createLinearGradient(0,0,0,GY);
 sg.addColorStop(0,era.bg); sg.addColorStop(1,era.sky);
 cx.fillStyle=sg; cx.fillRect(0,0,W,GY);

 // stars
 cx.fillStyle='rgba(255,255,255,0.15)';
 for(let i=0;i<30;i++){
  const sx=(i*137.5+13)%W, sy=(i*89.3+7)%(GY*0.6);
  cx.fillRect(sx,sy,1,1);
 }

 // ground
 const gg=cx.createLinearGradient(0,GY,0,H);
 gg.addColorStop(0,era.gnd); gg.addColorStop(1,adj(era.gnd,-20));
 cx.fillStyle=gg; cx.fillRect(0,GY,W,H-GY);

 // ground line
 cx.strokeStyle=adj(era.gnd,25); cx.lineWidth=2;
 cx.beginPath(); cx.moveTo(0,GY); cx.lineTo(W,GY); cx.stroke();

 // lane
 cx.setLineDash([8,16]); cx.strokeStyle='rgba(255,255,255,0.04)'; cx.lineWidth=1;
 cx.beginPath(); cx.moveTo(110,GY+12); cx.lineTo(W-110,GY+12); cx.stroke();
 cx.setLineDash([]);

 // bases
 drawBase(90,GY,'blue',S.bhp,S.maxhp);
 drawBase(W-90,GY,'red',S.rhp,S.maxhp);

 // projectiles
 for(const p of S.proj){
  if(!p.alive) continue;
  for(let i=0;i<p.trail.length;i++){
   const a=i/p.trail.length*0.4;
   cx.fillStyle=p.team==='blue'?`rgba(88,166,255,${a})`:`rgba(248,81,73,${a})`;
   cx.beginPath(); cx.arc(p.trail[i].x,p.trail[i].y,2,0,Math.PI*2); cx.fill();
  }
  cx.fillStyle=p.team==='blue'?'#58a6ff':'#f85149';
  cx.shadowColor=p.team==='blue'?'#58a6ff':'#f85149'; cx.shadowBlur=5;
  cx.beginPath(); cx.arc(p.x,p.y,3,0,Math.PI*2); cx.fill();
  cx.shadowBlur=0;
 }

 // units
 for(const u of S.units) if(!u.dead) drawUnit(u);

 // particles
 for(const p of S.parts){
  const a=p.life/p.ml;
  if(p.text){
  cx.font=`bold ${p.sz}px sans-serif`;
  cx.fillStyle=p.col; cx.globalAlpha=a;
  cx.fillText(p.text,p.x-15,p.y); cx.globalAlpha=1;
 } else {
  cx.fillStyle=p.col; cx.globalAlpha=a;
  cx.beginPath(); cx.arc(p.x,p.y,p.sz*a,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;
 }
 }
}

function drawBase(x,y,team,hp,maxhp){
 const r=hp/maxhp;
 const col=team==='blue'?'#58a6ff':'#f85149';
 const dk=team==='blue'?'#1a2a4a':'#4a1a1a';
 const bw=36,bh=55;

 // glow when low
 if(r<0.3){
  cx.fillStyle=`rgba(${team==='blue'?'88,166,255':'248,81,73'},${0.08+Math.sin(S.tick*0.06)*0.06})`;
  cx.beginPath(); cx.arc(x,y-bh/2,45,0,Math.PI*2); cx.fill();
 }

 cx.fillStyle=dk; cx.strokeStyle=col; cx.lineWidth=2;
 cx.fillRect(x-bw/2,y-bh,bw,bh);
 cx.strokeRect(x-bw/2,y-bh,bw,bh);

 // battlements
 for(let i=-1;i<=1;i+=2){
  cx.fillRect(x+i*(bw/2-5)-5,y-bh-10,10,10);
  cx.strokeRect(x+i*(bw/2-5)-5,y-bh-10,10,10);
 }

 // gate
 cx.fillStyle='#111';
 cx.beginPath(); cx.arc(x,y-10,8,Math.PI,0);
 cx.fillRect(x-8,y-10,16,10); cx.fill();

 // HP bar
 const baw=44,bah=5;
 cx.fillStyle='#21262d'; cx.fillRect(x-baw/2,y-bh-18,baw,bah);
 cx.fillStyle=col; cx.fillRect(x-baw/2,y-bh-18,baw*r,bah);
 cx.strokeStyle='#30363d'; cx.lineWidth=1;
 cx.strokeRect(x-baw/2,y-bh-18,baw,bah);

 // label
 cx.font='bold 10px sans-serif'; cx.fillStyle=col; cx.textAlign='center';
 cx.fillText(team==='blue'?'我方':'敌方',x,y+14);
 cx.textAlign='left';
}

function drawUnit(u){
 const dir=u.team==='blue'?1:-1;
 const fy=u.flying?u.y-30-Math.sin(S.tick*0.04+u.x*0.01)*4:u.y;
 const sz=u.sz;

 // shadow
 if(u.flying){
  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(u.x,u.y+2,sz*0.5,3,0,0,Math.PI*2); cx.fill();
 }

 // hit flash
 if(u.flash>0){
  cx.fillStyle='rgba(255,255,255,0.25)';
  cx.beginPath(); cx.arc(u.x,fy-sz/2,sz+4,0,Math.PI*2); cx.fill();
 }

 // body glow
 cx.fillStyle=u.team==='blue'?'rgba(88,166,255,0.12)':'rgba(248,81,73,0.12)';
 cx.beginPath(); cx.arc(u.x,fy-sz/2,sz+2,0,Math.PI*2); cx.fill();

 // body
 const bc=u.team==='blue'?'#2a5a9a':'#9a2a2a';
 const bl=u.team==='blue'?'#4a8aee':'#ee4a4a';
 cx.fillStyle=bc;
 cx.beginPath(); cx.arc(u.x,fy-sz/2,sz,0,Math.PI*2); cx.fill();
 cx.fillStyle=bl;
 cx.beginPath(); cx.arc(u.x-sz*0.15,fy-sz/2-sz*0.15,sz*0.35,0,Math.PI*2); cx.fill();

 // emoji
 cx.font=`${sz+5}px serif`; cx.textAlign='center'; cx.textBaseline='middle';
 cx.fillText(u.emoji,u.x,fy-sz/2);
 cx.textAlign='left'; cx.textBaseline='alphabetic';

 // attack animation
 if(u.atkAnim>4){
  cx.strokeStyle=u.team==='blue'?'rgba(88,166,255,0.5)':'rgba(248,81,73,0.5)';
  cx.lineWidth=2;
  const ad=u.team==='blue'?1:-1;
  cx.beginPath();
  cx.moveTo(u.x+ad*sz,fy-sz/2);
  cx.lineTo(u.x+ad*(sz+12),fy-sz/2);
  cx.stroke();
 }

 // HP bar
 if(u.hp<u.mhp){
  const bw=sz*1.8, bh=3;
  const bx=u.x-bw/2, by=fy-sz-7;
  cx.fillStyle='#21262d'; cx.fillRect(bx,by,bw,bh);
  const r=u.hp/u.mhp;
  cx.fillStyle=r>0.5?'#3fb950':r>0.25?'#d29922':'#f85149';
  cx.fillRect(bx,by,bw*r,bh);
 }
}

function adj(hex,amt){
 let r=parseInt(hex.slice(1,3),16)+amt;
 let g=parseInt(hex.slice(3,5),16)+amt;
 let b=parseInt(hex.slice(5,7),16)+amt;
 r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
 return`rgb(${r},${g},${b})`;
}

// ============ UI ============
function updateUI(){
 document.getElementById('gold').textContent=S.gold;
 document.getElementById('exp').textContent=S.exp;
 document.getElementById('kills').textContent=S.kills;
 document.getElementById('era-name').textContent=curE().name+' Lv.'+(S.era+1);
 document.getElementById('bhp').textContent=S.bhp;
 document.getElementById('rhp').textContent=S.rhp;
 document.getElementById('bbar').style.width=(S.bhp/S.maxhp*100)+'%';
 document.getElementById('rbar').style.width=(S.rhp/S.maxhp*100)+'%';

 // timer
 const m=Math.floor(S.gameTime/60), s=Math.floor(S.gameTime%60);
 document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;

 // unit buttons
 const btns=document.getElementById('unit-btns');
 btns.innerHTML='';
 const era=curE();
 era.units.forEach((u,i)=>{
  const b=document.createElement('button');
  b.className='unit-btn'+(S.gold<u.cost?' dis':'');
  b.innerHTML=`<span>${u.emoji} ${u.name}</span><span class="cost">${u.cost}💰</span><span class="desc">${u.ranged?'远程':'近战'}${u.flying?' 飞行':''}</span><span class="hk">[${i+1}]</span>`;
  b.onclick=()=>spawnBlue(u.id);
  btns.appendChild(b);
 });

 // upgrades
 const ec=eraCost();
 const eb=document.getElementById('btn-era');
 eb.textContent=S.era>=ERAS.length-1?'⏩ 已满级':`⏩ 升级时代 (${ec}⭐)`;
 eb.className='u-btn'+(S.era>=ERAS.length-1||S.exp<ec?' dis':'');
 eb.onclick=()=>upgradeEra();

 const ac=50+S.atkU*30;
 const ab=document.getElementById('btn-atk');
 ab.textContent=`⚔️ 攻击+20% (${ac}💰)`;
 ab.className='u-btn'+(S.gold<ac?' dis':'');
 ab.onclick=()=>{if(S.gold>=ac){S.gold-=ac;S.atkM*=1.2;S.atkU++;}};

 const hc=50+S.hpU*30;
 const hb=document.getElementById('btn-hp');
 hb.textContent=`❤️ 生命+20% (${hc}💰)`;
 hb.className='u-btn'+(S.gold<hc?' dis':'');
 hb.onclick=()=>{if(S.gold>=hc){S.gold-=hc;S.hpM*=1.2;S.hpU++;}};

 const gc=80+S.goldU*50;
 const gb=document.getElementById('btn-gold');
 gb.textContent=`💰 经济+30% (${gc}💰)`;
 gb.className='u-btn'+(S.gold<gc?' dis':'');
 gb.onclick=()=>{if(S.gold>=gc){S.gold-=gc;S.goldM*=1.3;S.goldU++;}};

 const sb=document.getElementById('speed-btn');
 sb.textContent=`⏩ x${S.speed}`;
 sb.onclick=()=>{S.speed=S.speed===1?2:S.speed===2?3:1;};
}

function upgradeEra(){
 const c=eraCost();
 if(S.era>=ERAS.length-1||S.exp<c) return;
 S.exp-=c; S.era++;
 S.maxhp+=600;
 S.bhp=Math.min(S.bhp+400,S.maxhp);
 S.rhp=Math.min(S.rhp+250,S.maxhp);
 toast('⚡ '+curE().name+' ⚡','#e94560');
}

function toast(txt,col){
 const el=document.getElementById('toast');
 el.textContent=txt; el.style.color=col; el.style.opacity=1;
 setTimeout(()=>el.style.opacity=0,2500);
}

function endGame(win){
 S.over=1;
 const go=document.getElementById('game-over');
 go.style.display='flex';
 document.getElementById('go-title').textContent=win?'🎉 胜利！':'💀 战败';
 document.getElementById('go-title').style.color=win?'#ffd700':'#f85149';
 document.getElementById('go-desc').textContent=win?'你摧毁了敌方基地！用时'+Math.floor(S.gameTime/60)+'分'+Math.floor(S.gameTime%60)+'秒':'你的基地被摧毁了';
}

function restart(){
 init();
 document.getElementById('game-over').style.display='none';
 buildHK();
}

// ============ HOTKEYS ============
let hkMap={};
function buildHK(){
 hkMap={};
 const era=curE();
 era.units.forEach((u,i)=>{hkMap[String(i+1)]=u.id;});
}
buildHK();

document.addEventListener('keydown',e=>{
 if(S.over) return;
 const id=hkMap[e.key];
 if(id){spawnBlue(id);e.preventDefault();}
 if(e.key==='q'||e.key==='Q'){upgradeEra();e.preventDefault();}
 if(e.key==='w'||e.key==='W'){document.getElementById('btn-atk').click();e.preventDefault();}
 if(e.key==='e'||e.key==='E'){document.getElementById('btn-hp').click();e.preventDefault();}
 if(e.key==='r'||e.key==='R'){document.getElementById('btn-gold').click();e.preventDefault();}
});

// ============ GAME LOOP ============
function loop(){
 update();
 draw();
 updateUI();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
